<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gear Puzzle</title>
<link rel="stylesheet" href="game_styles.css">
</head>
<body>

<button id="startBtn">Play</button>

<div id="gameArea" class="hidden">
    <div class="operateBar">
        <canvas id="drawMap"></canvas>
    </div>

    <div class="gearBar">
        <canvas id="drawCircles"></canvas>
    </div>
</div>

<script src="game_main.js"></script>

<script>
document.getElementById("startBtn").onclick = () => {
    document.getElementById("gameArea").classList.remove("hidden");
    resizeCanvas();
    buildGame();
};
</script>

</body>
</html>
