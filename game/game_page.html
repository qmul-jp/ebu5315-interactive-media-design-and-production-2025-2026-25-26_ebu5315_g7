<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gear Puzzle</title>
<link rel="stylesheet" href="game_styles.css">
<link rel="stylesheet" href="../navbar/navbar.css">
<script src="../navbar/navbar.js"></script>
</head>
<body>
<top-navbar page-type="game" home-link="../index.html"></top-navbar>

<div id="introContainer" class="intro-container">
    
    <div id="gameIntro" class="game-intro-card">
        <div class="game-title">圆神启动</div>
        <div id="displayAre"></div>
        <div id="demoAre">
            <p id="gameintro1">这个游戏考察有关圆的位置关系的知识。通过放置一些列不同半径的齿轮，让整个系统运转起来吧！在较难的关卡中，你需要计算圆心之间的距离并寻找合适的齿轮。</p>
        </div>
        <button id="startBtn">Play</button>   
    </div>

    <div id="gameIntro2" class="game-intro-card">
        <div class="game-title">圆神牛福</div>
        <div id="displayAre2"></div>
        <div id="demoAre2">
            <p id="gameintro2">这是一个走迷宫游戏。移动小球，让它到达最中心吧！注意，不停地转圈会扰乱你的判断哦！</p>
        </div>
        <button id="startBtn2">Play</button>   
    </div>

</div>


<div id="gameArea" class="hidden">
    <div class="game-toolbar">
        <button id="gameExitBtn">退出</button>
        <div class="game-title">Game 1</div>
        <div class="toolbar-right">
            <select id="difficultySelect">
                <option value="1">难度一 (简单)</option>
                <option value="3">难度二 (困难)</option>
                <option value="4">难度三 (地狱)</option>
            </select>
            <div class="toggle-container">
                <input type="checkbox" id="markToggle">
                <label for="markToggle">标记模式</label>
            </div>
            <button id="resetBtn">重置地图</button>
        </div>
    </div>
    <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
    </div>
</div>

<div id="gameArea2" class="hidden">
    <div class="game-toolbar">
        <button id="gameExitBtn2">退出</button>
        <div class="game-title">Game 2</div>
        <div class="toolbar-right">
            <select id="difficultySelect2">
                <option value="1">难度一（简单）</option>
                <option value="2">难度二（困难）</option>
            </select>
            <button id="resetBtn2">重置地图</button>
        </div>
    </div>
    <div class="canvas-wrap">
        <canvas id="canvas2"></canvas>
    </div>
    
</div>

<div id="winModal" class="modal hidden">
    <div class="modal-content">
        <div class="confetti-wrapper">
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
        </div>

        <button id="modalCloseBtn" class="modal-close">×</button>
        
        <div style="font-size: 50px; margin-bottom: 10px;">🎉</div>
        <h2 style="color: var(--primary); font-size: 24px;">精彩的表现！</h2>
        <p style="color: #64748b;">齿轮已完美咬合，关卡解锁成功。</p>

        <div class="modal-actions">
            <button id="exitBtn" style="background: #f1f5f9; color: #475569; box-shadow: none;">退出</button>
            <button id="retryBtn">再次挑战</button>
        </div>
    </div>
</div>

<script src="game_main.js"></script>
<script src="game_main2.js"></script>

<script>
// --- Game 1 绑定 ---
document.getElementById("startBtn").onclick = startGame;
document.getElementById("gameExitBtn").onclick = exitGame;

// --- Game 2 绑定 ---
document.getElementById("startBtn2").onclick = startGame2;
document.getElementById("gameExitBtn2").onclick = exitGame2;
document.getElementById("resetBtn2").onclick = restartGame2;

// 监听 Game 2 的难度下拉框切换
document.getElementById("difficultySelect2").addEventListener("change", function(e) {
    if (e.target.value === "1") {
        setDifficulty2('easy');
    } else if (e.target.value === "2") {
        setDifficulty2('hard');
    }
});

// --- 弹窗逻辑绑定 ---
document.getElementById("modalCloseBtn").onclick = hideWinModal;

// 根据当前打开的游戏面板决定点击弹窗按钮的行为
document.getElementById("exitBtn").onclick = function() {
    const area1 = document.getElementById("gameArea");
    const area2 = document.getElementById("gameArea2");
    if (!area1.classList.contains("hidden")) exitGame();
    if (!area2.classList.contains("hidden")) exitGame2();
};

document.getElementById("retryBtn").onclick = function() {
    const area1 = document.getElementById("gameArea");
    const area2 = document.getElementById("gameArea2");
    if (!area1.classList.contains("hidden")) restartGame();
    if (!area2.classList.contains("hidden")) restartGame2();
};
</script>

<script>
(function initCyberpunkRipples() {
    // 1. 创建全局悬浮 Canvas
    const rippleCanvas = document.createElement('canvas');
    rippleCanvas.style.position = 'fixed';
    rippleCanvas.style.top = '0';
    rippleCanvas.style.left = '0';
    rippleCanvas.style.width = '100vw';
    rippleCanvas.style.height = '100vh';
    rippleCanvas.style.pointerEvents = 'none'; // 关键：让鼠标穿透，不影响按钮和游戏操作
    rippleCanvas.style.zIndex = '9999';        // 确保在最顶层
    document.body.appendChild(rippleCanvas);

    const ctx = rippleCanvas.getContext('2d');
    let width, height;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        rippleCanvas.width = width;
        rippleCanvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // 2. 核心数据与赛博配色
    const ripples = [];
    const cyberColors = [
        '#00f0ff', // 霓虹青
        '#b026ff', // 赛博紫
        '#00ff66', // 终端绿
        '#ff0055', // 警告红
        '#ffd700'  // 能量黄
    ];

    // 3. 单个圆弧类
    class CyberArc {
        constructor(baseRadius) {
            this.radius = baseRadius;
            this.color = cyberColors[Math.floor(Math.random() * cyberColors.length)];
            this.lineWidth = Math.random() * 2 + 1.5; // 1.5px - 3.5px
            
            // 随机开口方向
            this.startAngle = Math.random() * Math.PI * 2;
            
            // 设定弧长：80% 概率为优弧 (大于半圆)，20% 为劣弧
            let arcSpan;
            if (Math.random() < 0.8) {
                // 优弧：PI 到 1.8 PI 之间
                arcSpan = Math.PI + Math.random() * Math.PI * 0.8; 
            } else {
                // 劣弧：0.2 PI 到 PI 之间
                arcSpan = Math.PI * 0.2 + Math.random() * Math.PI * 0.8;
            }
            this.endAngle = this.startAngle + arcSpan;
            
            // 扩散速度
            this.speed = Math.random() * 2 + 2; 
        }

        update() {
            this.radius += this.speed;
        }

        draw(ctx, x, y, alpha) {
            ctx.beginPath();
            ctx.arc(x, y, this.radius, this.startAngle, this.endAngle);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = this.lineWidth;
            ctx.globalAlpha = alpha;
            
            // 赛博朋克发光 (Glow) 效果
            ctx.shadowBlur = 12;
            ctx.shadowColor = this.color;
            ctx.stroke();
            
            // 叠加一次无阴影的高亮核心线，让光效更锐利
            ctx.shadowBlur = 0;
            ctx.stroke();
        }
    }

    // 4. 涟漪控制器类 (管理多段同心弧)
    class Ripple {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.age = 0;
            this.maxAge = 40 + Math.random() * 20; // 存活 40 - 60 帧
            this.arcs = [];
            
            // 每次点击生成 2 到 4 段同心圆弧
            let numArcs = Math.floor(Math.random() * 3) + 2; 
            for (let i = 0; i < numArcs; i++) {
                // 半径错开，形成同心效果
                this.arcs.push(new CyberArc(i * 12)); 
            }
        }

        update() {
            this.age++;
            this.arcs.forEach(arc => arc.update());
        }

        draw(ctx) {
            // 计算透明度：随时间抛物线衰减，消失更平滑
            let progress = this.age / this.maxAge;
            let alpha = 1 - Math.pow(progress, 2); 
            if (alpha < 0) alpha = 0;

            this.arcs.forEach(arc => arc.draw(ctx, this.x, this.y, alpha));
            ctx.globalAlpha = 1.0; // 重置透明度防污染
        }
    }

    // 5. 监听全局点击事件
    window.addEventListener('mousedown', (e) => {
        // 记录点击时的绝对坐标，传入 Ripple
        ripples.push(new Ripple(e.clientX, e.clientY));
    });

    // 6. 动画主循环
    function animate() {
        ctx.clearRect(0, 0, width, height);
        
        // 倒序遍历，方便删除已结束的动画
        for (let i = ripples.length - 1; i >= 0; i--) {
            ripples[i].update();
            ripples[i].draw(ctx);
            
            if (ripples[i].age >= ripples[i].maxAge) {
                ripples.splice(i, 1);
            }
        }
        requestAnimationFrame(animate);
    }
    animate();

})();
</script>
</body>
</html>
